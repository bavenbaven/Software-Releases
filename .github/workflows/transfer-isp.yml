name: Transfer ISP Images to PICTURES-ONLY

on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo (Software-Releases)
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 1

      - name: Checkout target repo (ERS-TECH-ISP-PICTURES-ONLY)
        uses: actions/checkout@v4
        with:
          repository: bavenbaven/ERS-TECH-ISP-PICTURES-ONLY
          token: ${{ secrets.TRANSFER_TOKEN }}
          path: target
          fetch-depth: 1

      - name: Copy ISP folder to target
        run: |
          python3 << 'PYEOF'
          import os, shutil
          
          source_root = "source"
          target_root = "target"
          
          # Find the ISP folder (contains Chinese chars, find dynamically)
          isp_folder = None
          for name in os.listdir(source_root):
              full = os.path.join(source_root, name)
              if os.path.isdir(full) and "ISP" in name.upper() and "PICTURE" not in name.upper():
                  isp_folder = full
                  print(f"Found ISP folder: {name}")
                  break
          
          if not isp_folder:
              print("ERROR: Could not find ISP folder!")
              print("Contents of source:")
              for n in os.listdir(source_root):
                  print(f"  {n}")
              exit(1)
          
          # Count files
          file_count = sum(len(files) for _, _, files in os.walk(isp_folder))
          print(f"Files to copy: {file_count}")
          
          # Copy all contents to target root
          for item in os.listdir(isp_folder):
              src = os.path.join(isp_folder, item)
              dst = os.path.join(target_root, item)
              if os.path.isdir(src):
                  if os.path.exists(dst):
                      shutil.rmtree(dst)
                  shutil.copytree(src, dst)
              else:
                  shutil.copy2(src, dst)
          
          # Verify
          target_count = sum(len(files) for _, _, files in os.walk(target_root))
          print(f"Files in target after copy: {target_count}")
          print("Copy complete!")
          PYEOF

      - name: Commit and push to target
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Transfer ISP images from Software-Releases $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main
            echo "Push successful!"
          fi
