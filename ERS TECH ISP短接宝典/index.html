<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERS Tech ISP鐭帴瀹濆吀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e14;--bg2:#10151d;--card:#151c27;--card2:#1a2332;
  --border:#252d3a;--border2:#2e3848;
  --accent:#5eafff;--accent2:#e94560;--accent3:#f0a500;--accent4:#a78bfa;
  --text:#dfe6f0;--text2:#7a8ba0;--text3:#4e5d6e;
  --hover:#1a2535;--glow:rgba(94,175,255,.14);--glow2:rgba(167,139,250,.12);
  --grad-accent:linear-gradient(135deg,#5eafff,#a78bfa);
  --grad-warm:linear-gradient(135deg,#e94560,#f0a500);
  --grad-cool:linear-gradient(135deg,#5eafff,#4ecdc4);
  --grad-dark:linear-gradient(180deg,rgba(20,28,40,.6),rgba(10,14,20,.8));
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --shadow-md:0 8px 24px rgba(0,0,0,.4);
  --shadow-lg:0 16px 48px rgba(0,0,0,.6);
  --shadow-glow:0 0 24px var(--glow);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --glow-a:.14;--glow2-a:.12;
  --body-r:94;--body-g:175;--body-b:255;
  --body2-r:167;--body2-g:139;--body2-b:250;
  --body3-r:78;--body3-g:205;--body3-b:196;
  --header-bg:linear-gradient(180deg,rgba(20,28,40,.85) 0%,rgba(15,20,30,.92) 100%);
  --sidebar-bg:linear-gradient(180deg,rgba(15,20,30,.75) 0%,rgba(10,14,20,.85) 100%);
  --sidebar-border:linear-gradient(180deg,transparent,rgba(94,175,255,.15) 30%,rgba(167,139,250,.15) 70%,transparent);
  --brand-active-bg:linear-gradient(90deg,rgba(94,175,255,.12) 0%,rgba(94,175,255,.04) 100%);
  --model-active-bg:linear-gradient(90deg,rgba(94,175,255,.08),transparent);
  --card-hover-glow:linear-gradient(135deg,rgba(94,175,255,.08) 0%,transparent 50%,rgba(167,139,250,.06) 100%);
  --empty-glow:radial-gradient(circle,rgba(94,175,255,.06),transparent 70%);
  --ad-hover-glow:linear-gradient(135deg,rgba(94,175,255,.12),rgba(167,139,250,.12));
  --header-accent:linear-gradient(90deg,transparent 5%,rgba(94,175,255,.35) 30%,rgba(167,139,250,.35) 70%,transparent 95%);
  --header-glow:linear-gradient(180deg,rgba(94,175,255,.1),transparent);
  --thumb-bg:linear-gradient(135deg,var(--bg2),#0a0e14);
  --accent-a8:rgba(94,175,255,.08);--accent-a12:rgba(94,175,255,.12);
  --accent-a15:rgba(94,175,255,.15);--accent-a2:rgba(94,175,255,.2);
  --accent-a3:rgba(94,175,255,.3);--accent-a35:rgba(94,175,255,.35);
  --accent-a4:rgba(94,175,255,.4);--accent-a03:rgba(94,175,255,.03);
  --a4-a12:rgba(167,139,250,.12);--a4-a15:rgba(167,139,250,.15);
  --a4-a2:rgba(167,139,250,.2);--a4-a3:rgba(167,139,250,.3);--a4-a4:rgba(167,139,250,.4);
  --a3-a18:rgba(240,165,0,.18);
}
body{
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 1200px 600px at 20% 0%,rgba(var(--body-r),var(--body-g),var(--body-b),.08),transparent 60%),
    radial-gradient(ellipse 800px 500px at 90% 100%,rgba(var(--body2-r),var(--body2-g),var(--body2-b),.06),transparent 60%),
    radial-gradient(ellipse 600px 400px at 50% 50%,rgba(var(--body3-r),var(--body3-g),var(--body3-b),.03),transparent 70%);
  color:var(--text);height:100vh;overflow:hidden;letter-spacing:.01em;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.5 0 0 0 0 0.7 0 0 0 0.05 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.4;mix-blend-mode:overlay;
}
#app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}
header{
  display:flex;align-items:center;gap:14px;padding:0 20px;height:52px;
  background:var(--header-bg);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:10;
  -webkit-app-region:drag;
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 4px 20px rgba(0,0,0,.2);
}
header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:var(--header-accent);
  opacity:.35;
}
header::before{
  content:'';position:absolute;bottom:-8px;left:0;right:0;height:8px;
  background:var(--header-glow);
  pointer-events:none;
}
#main-logo{
  height:28px;margin-right:2px;border-radius:6px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.06);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#main-logo:hover{transform:scale(1.05) rotate(-2deg)}
header h1{
  font-size:15px;white-space:nowrap;
  background:var(--grad-accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-weight:700;letter-spacing:.4px;flex-shrink:0;
  text-shadow:0 0 24px var(--accent-a2);
}
header input{
  height:34px;width:240px;padding:0 14px;
  border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);
  background:rgba(255,255,255,.04);color:var(--text);font-size:13px;
  outline:none;transition:all .25s cubic-bezier(.4,0,.2,1);
  -webkit-app-region:no-drag;flex-shrink:0;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 2px 6px rgba(0,0,0,.15);
}
header input:focus{
  border-color:var(--accent-a4);
  box-shadow:0 0 0 3px var(--glow),0 1px 0 rgba(255,255,255,.05) inset;
  background:rgba(255,255,255,.06);
}
header input::placeholder{color:var(--text3);font-weight:400}
.header-ctrl{display:flex;align-items:stretch;gap:0;margin-left:auto;flex-shrink:0}
.header-ctrl button{
  -webkit-app-region:no-drag;width:44px;height:100%;
  display:flex;align-items:center;justify-content:center;
  border:none;background:transparent;color:var(--text3);font-size:13px;
  cursor:pointer;transition:all .2s;border-radius:0;position:relative;
}
.header-ctrl button:hover{background:rgba(255,255,255,.06);color:var(--text)}
.header-ctrl button:active{background:rgba(255,255,255,.04)}
.header-ctrl .btn-close:hover{background:rgba(233,69,96,.85);color:#fff}
.header-ctrl .btn-close:active{background:rgba(233,69,96,.7)}
header .stats{font-size:12px;color:var(--text2);white-space:nowrap}
header button,header .settings-btn,header input{-webkit-app-region:no-drag}
#header-viewer-tools button,#header-viewer-tools input,#annot-tools-inline button,#annot-tools-inline input{-webkit-app-region:no-drag}
header .settings-btn{
  height:34px;padding:0 14px;font-size:12px;display:inline-flex;align-items:center;gap:6px;
  border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);
  background:rgba(255,255,255,.03);color:var(--text2);cursor:pointer;white-space:nowrap;
  flex-shrink:0;transition:all .25s cubic-bezier(.4,0,.2,1);font-weight:500;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset;
}
header .settings-btn:hover{
  border-color:var(--accent-a35);color:var(--accent);
  background:var(--accent-a8);box-shadow:0 0 16px var(--glow),0 1px 0 rgba(255,255,255,.05) inset;
  transform:translateY(-1px);
}
#header-viewer-tools{height:36px;min-height:36px;max-height:36px;overflow:hidden}
#header-viewer-tools .btn-action{height:32px;padding:0 12px;font-size:12px;border-radius:var(--radius-sm)}
#header-viewer-tools .tool-btn{height:32px;padding:0 10px;font-size:12px}
#annot-tools-inline{height:32px;max-height:32px;background:rgba(255,255,255,.04);padding:3px 6px;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.08);box-shadow:0 1px 0 rgba(255,255,255,.03) inset}
#annot-tools-inline .tool-btn{height:26px;padding:0 8px;font-size:11px}
#v-toolbar .ql-btn{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:var(--radius-sm);text-decoration:none;color:var(--text);border:1px solid rgba(255,255,255,.08);font-size:12px;font-weight:500;transition:all .2s}
#v-toolbar .ql-btn:hover{color:#fff;border-color:var(--accent-a3);box-shadow:0 0 12px var(--glow)}
#body{display:flex;flex:1;overflow:hidden;position:relative}
#sidebar{
  width:232px;min-width:232px;
  background:var(--sidebar-bg);
  backdrop-filter:blur(16px) saturate(1.2);
  -webkit-backdrop-filter:blur(16px) saturate(1.2);
  border-right:1px solid var(--border);
  flex-shrink:0;display:flex;flex-direction:column;
  box-shadow:2px 0 12px rgba(0,0,0,.2);
  position:relative;
}
#sidebar::before{
  content:'';position:absolute;top:0;right:0;bottom:0;width:1px;
  background:var(--sidebar-border);
  pointer-events:none;
}
#sidebar-list{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:thin}
#sidebar-ads{
  padding:12px;border-top:1px solid var(--border);
  display:flex;flex-direction:row;gap:8px;flex-shrink:0;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.2));
}
#sidebar-ads .ad-link{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 0;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.06);font-size:12px;font-weight:500;
  color:var(--text2);text-decoration:none;
  transition:all .3s cubic-bezier(.4,0,.2,1);cursor:pointer;
  position:relative;overflow:hidden;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 2px 6px rgba(0,0,0,.15);
}
#sidebar-ads .ad-link::before{
  content:'';position:absolute;inset:0;
  background:var(--ad-hover-glow);
  opacity:0;transition:opacity .3s;
}
#sidebar-ads .ad-link::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  transition:left .6s ease;
}
#sidebar-ads .ad-link:hover::before{opacity:1}
#sidebar-ads .ad-link:hover::after{left:100%}
#sidebar-ads .ad-link:hover{
  border-color:var(--accent-a4);color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,.3),0 0 16px var(--glow);
}
#sidebar .brand{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  cursor:pointer;font-size:13px;color:var(--text2);
  transition:all .2s;border-left:3px solid transparent;
  font-weight:500;position:relative;
}
#sidebar .brand::before{
  content:'';position:absolute;left:0;top:50%;width:3px;height:0;
  background:linear-gradient(180deg,var(--accent),var(--accent4));
  border-radius:0 2px 2px 0;transition:all .25s cubic-bezier(.4,0,.2,1);
  transform:translateY(-50%);
}
#sidebar .brand:hover{background:rgba(255,255,255,.04);color:var(--text);padding-left:18px}
#sidebar .brand:hover::before{height:60%;background:var(--accent)}
#sidebar .brand.active{
  background:var(--brand-active-bg);
  color:var(--accent);
}
#sidebar .brand.active::before{height:70%}
#sidebar .brand .count{
  font-size:11px;color:var(--text3);margin-left:auto;font-weight:500;
  background:rgba(255,255,255,.04);padding:2px 8px;border-radius:10px;
  border:1px solid rgba(255,255,255,.04);
}
#sidebar .brand.active .count{
  background:var(--accent-a15);color:var(--accent);
  border-color:var(--accent-a2);
}
#sidebar .brand .arrow{
  font-size:9px;transition:transform .3s cubic-bezier(.4,0,.2,1);
  width:12px;text-align:center;color:var(--text3);
}
#sidebar .brand .arrow.open{transform:rotate(90deg);color:var(--accent)}
#sidebar .model{
  display:flex;align-items:center;gap:8px;padding:7px 16px 7px 36px;
  cursor:pointer;font-size:12px;color:var(--text2);
  transition:all .2s cubic-bezier(.4,0,.2,1);
  animation:slideIn .3s ease-out;position:relative;
}
#sidebar .model::before{
  content:'';position:absolute;left:22px;top:50%;width:4px;height:4px;
  border-radius:50%;background:var(--text3);transform:translateY(-50%);
  transition:all .2s;
}
#sidebar .model:hover{background:rgba(255,255,255,.03);color:var(--text);padding-left:38px}
#sidebar .model:hover::before{background:var(--accent);box-shadow:0 0 6px var(--accent)}
#sidebar .model.active{
  color:var(--accent);font-weight:600;
  background:var(--model-active-bg);
}
#sidebar .model.active::before{background:var(--accent);box-shadow:0 0 8px var(--accent);width:6px;height:6px}
#sidebar .model .icon{font-size:10px;opacity:.4;display:none}
#sidebar .model .count{margin-left:auto;font-size:10px;color:var(--text3);font-weight:500}
#main{flex:1;overflow-y:auto;padding:24px;position:relative}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}
.card{
  border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  background:var(--card);position:relative;
  box-shadow:var(--shadow-sm);
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:var(--radius);
  opacity:0;transition:opacity .4s;pointer-events:none;
  background:var(--card-hover-glow);
}
.card::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
  transition:left .8s ease;z-index:2;pointer-events:none;
}
.card:hover{transform:translateY(-8px);border-color:var(--accent-a4);box-shadow:var(--shadow-lg),0 0 32px var(--glow)}
.card:hover::after{opacity:1}
.card:hover::before{left:100%}
.card .thumb{
  width:100%;height:150px;object-fit:cover;display:block;
  background:var(--thumb-bg);
  transition:transform .5s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.card:hover .thumb{transform:scale(1.06)}
.card .info{
  padding:12px 14px;position:relative;z-index:1;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.15));
}
.card .info .model-name{
  font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;font-weight:600;letter-spacing:.2px;
}
.card .info .file-name{
  font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;margin-top:4px;display:flex;align-items:center;gap:4px;
}
.card .info .file-name::before{
  content:'';width:3px;height:3px;border-radius:50%;background:var(--accent);
  opacity:.6;flex-shrink:0;
}
.empty-state{
  display:flex;align-items:center;justify-content:center;height:60vh;
  color:var(--text2);font-size:16px;flex-direction:column;gap:18px;
  animation:fadeIn .5s;position:relative;
}
.empty-state::before{
  content:'';position:absolute;width:300px;height:300px;border-radius:50%;
  background:var(--empty-glow);
  animation:float 4s ease-in-out infinite;z-index:-1;
}
.empty-state .big{
  font-size:72px;filter:grayscale(.1) drop-shadow(0 8px 24px rgba(0,0,0,.4));
  animation:float 3s ease-in-out infinite;
}
.empty-state .hint{font-size:13px;color:var(--text3);opacity:.8}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes loading{0%{width:0%}50%{width:70%}100%{width:100%}}
.loading{
  color:var(--text3);font-size:13px;animation:pulse 1.5s infinite;
  text-align:center;padding:20px;
}
#viewer{display:flex;flex-direction:column;height:100%}
#v-toolbar{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:linear-gradient(180deg,var(--card) 0%,var(--bg2) 100%);
  border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);
  margin-bottom:12px;flex-shrink:0;flex-wrap:wrap;
  box-shadow:var(--shadow-sm);
}
#v-toolbar .v-title{font-size:13px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
#v-toolbar button{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:var(--text);padding:6px 14px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:12px;font-weight:500;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset;
}
#v-toolbar button:hover{
  background:var(--accent-a12);border-color:var(--accent-a35);
  box-shadow:0 0 16px var(--glow),0 1px 0 rgba(255,255,255,.05) inset;
  transform:translateY(-1px);
}
#v-toolbar button.active{
  background:var(--grad-accent);color:#0b0f15;border-color:transparent;
  font-weight:600;box-shadow:0 0 16px var(--accent-a4),0 1px 0 rgba(255,255,255,.2) inset;
}
#v-toolbar .back-btn{border-color:rgba(233,69,96,.4);color:var(--accent2)}
#v-toolbar .back-btn:hover{background:rgba(233,69,96,.15);border-color:var(--accent2);box-shadow:0 0 12px rgba(233,69,96,.2)}
#v-toolbar .nav-btn{font-size:13px;padding:6px 18px}
#v-toolbar .sep{width:1px;height:20px;background:rgba(255,255,255,.08);margin:0 4px}
#v-filename{
  text-align:center;padding:10px 16px;font-size:22px;font-weight:700;
  background:var(--grad-accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  animation:fadeIn .3s;position:relative;
}
#v-filename::after{
  content:'';position:absolute;bottom:0;left:50%;width:60px;height:2px;
  background:var(--grad-accent);transform:translateX(-50%);
  border-radius:2px;opacity:.6;
}
#v-body{
  flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;
  position:relative;border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);
  background:
    radial-gradient(ellipse at center,#1a2438 0%,#0a0e14 70%),
    linear-gradient(180deg,#0e141d,#080c12);
  box-shadow:0 4px 20px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.02) inset;
}
#v-body::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(var(--accent-a3) 1px,transparent 1px),
    linear-gradient(90deg,var(--accent-a3) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse at center,#000 30%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse at center,#000 30%,transparent 80%);
}
#v-body::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.4) 100%);
}
img {
  -webkit-user-drag: none;
  pointer-events: none;
}
#v-body img{
  max-width:100%;max-height:100%;object-fit:contain;
  transition:transform .2s;user-select:none;-webkit-user-drag:none;
  position:relative;z-index:1;
  filter:drop-shadow(0 8px 32px rgba(0,0,0,.4));
}
#v-body canvas{position:absolute;cursor:crosshair;pointer-events:none;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2}
#v-body canvas.active{pointer-events:all}
#v-body canvas.edit-mode{cursor:default}
.v-nav-overlay{
  position:absolute;top:0;bottom:0;width:120px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:10;
  color:rgba(255,255,255,.25);font-size:64px;font-weight:bold;
  transition:all .3s cubic-bezier(.4,0,.2,1);user-select:none;
  background:linear-gradient(90deg,rgba(0,0,0,.2),transparent);
  backdrop-filter:blur(2px);
}
.v-nav-overlay:hover{color:rgba(255,255,255,.95);background:linear-gradient(90deg,rgba(0,0,0,.5),transparent)}

async function loadOnlineLibrary(skipCache) {
  document.getElementById('search').placeholder = '姝ｅ湪鑾峰彇鏁版嵁...';
  
  if (!window.currentGhSha) {
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 3000);
      const shaRes = await fetch('https://api.github.com/repos/bavenbaven/ERS-TECH-ISP-PICTURES-ONLY/commits/main', { cache: 'no-store', signal: controller.signal });
      clearTimeout(timeoutId);
      if (shaRes.ok) {
        const shaData = await shaRes.json();
        if (shaData.sha) {
          window.currentGhSha = shaData.sha;
        }
      }
    } catch (e) {
      console.warn("Failed to get latest commit SHA", e);
    }
  }

  const urls = skipCache
    ? [GITHUB_RAW_BASE + '/metadata.json?_t=' + Date.now()]
    : [getCdnBase() + '/metadata.json', JSDELIVR_CDN_BASE + '/metadata.json', GITHUB_RAW_BASE + '/metadata.json?_t=' + Date.now()];

  for (const ghUrl of urls) {
    try {
      const res = await fetch(ghUrl);
      if (res.ok) {
        const ghText = await res.text();
        data = JSON.parse(ghText.replace(/^\uFEFF/, ''));
        updateSearchStats('浜戠');
        return data;
      }
    } catch (e) {
      console.warn('metadata fetch failed:', ghUrl, e);
    }
  }
  throw new Error('缃戠粶杩炴帴澶辫触锛岃妫€鏌ョ綉缁溿€?);
}

function _parseVersion(v) {
  return (v || '0.0.0').split('.').map(Number);
}

function _isVersionNewer(a, b) {
  const pa = _parseVersion(a), pb = _parseVersion(b);
  for (let i = 0; i < 3; i++) {
    if (pa[i] > pb[i]) return true;
    if (pa[i] < pb[i]) return false;
  }
  return false;
}

async function verifyLicenseKey() {
  const key = document.getElementById('license-key-input').value.trim();
  if (!key) { showLicenseError('璇疯緭鍏ユ巿鏉冪爜'); return; }
  hideLicenseError();
  showLicenseLoading(true);
  try {
    await invoke('verify_license', { key: key });
    hideLicenseModal();

    // Re-run init after successful auth
    await init();
  } catch (e) {
    showLicenseError('鎺堟潈鐮佹棤鏁? ' + e);
  } finally {
    showLicenseLoading(false);
  }
}

async function verifyLicenseUser() {
  const username = document.getElementById('license-user-input').value.trim();
  const password = document.getElementById('license-pass-input').value.trim();
  if (!username || !password) { showLicenseError('璇疯緭鍏ョ敤鎴峰悕鍜屽瘑鐮?); return; }
  hideLicenseError();
  showLicenseLoading(true);
  try {
    await invoke('verify_license', { username: username, password: password });
    // 璁颁綇瀵嗙爜锛氫繚瀛樺嚟鎹埌 localStorage
    const remember = document.getElementById('remember-me-checkbox').checked;
    if (remember) {
      localStorage.setItem('saved_username', username);
      localStorage.setItem('saved_password', password);
      localStorage.setItem('remember_me', 'true');
    } else {
      localStorage.removeItem('saved_username');
      localStorage.removeItem('saved_password');
      localStorage.removeItem('remember_me');
    }
    hideLicenseModal();
    localStorage.setItem('license_verified', 'true');
    await init();
  } catch (e) {
    showLicenseError('鐧诲綍澶辫触: ' + e);
  } finally {
    showLicenseLoading(false);
  }
}

// Auto-check for incremental updates on startup: detect 鈫?download one by one 鈫?restart
async function _autoUpdater() {
  setTimeout(async () => {
    try {
      const verEl = document.getElementById('settings-current-version');
      if (verEl) verEl.textContent = 'v' + (await _getAppVersion());

      const result = await invoke('check_incremental_update');
      if (!result || !result.changed_files || result.changed_files.length === 0) return;

      const files = result.changed_files;
      const total = files.length;
      const totalKB = (result.total_download_size / 1024).toFixed(1);
      console.log('[AutoUpdate] Found ' + total + ' files (' + totalKB + 'KB)');

      const bar = document.createElement('div');
      bar.id = 'auto-update-bar';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:rgba(30,30,40,.95);border-top:1px solid rgba(74,222,128,.3);padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:20px;z-index:99999;font-size:13px;color:#4ade80;backdrop-filter:blur(10px);';
      bar.innerHTML = '<div style="display:flex;align-items:center;gap:12px;flex:1;max-width:600px;">' +
        '<span id="auto-update-label" style="white-space:nowrap;color:var(--text3);font-size:12px;">鍑嗗鏇存柊...</span>' +
        '<div style="flex:1;background:rgba(255,255,255,.08);height:6px;border-radius:3px;overflow:hidden;">' +
        '<div id="auto-update-bar-fill" style="width:0%;height:100%;background:linear-gradient(90deg,#4ade80,#22c55e);border-radius:3px;transition:width 0.3s ease;"></div>' +
        '</div>' +
        '<span id="auto-update-pct" style="color:#4ade80;font-size:12px;font-weight:600;min-width:36px;text-align:right;">0%</span>' +
        '</div>';
      document.body.appendChild(bar);

      const label = document.getElementById('auto-update-label');
      const fill = document.getElementById('auto-update-bar-fill');
      const pct = document.getElementById('auto-update-pct');

      let completed = 0;
      for (let i = 0; i < files.length; i++) {
        const f = files[i];
        const fileName = f.path.split('/').pop();
        if (label) label.textContent = '姝ｅ湪涓嬭浇 ' + fileName + '...';

        try {
          await invoke('download_single_file', { file: f });
        } catch (e) {
          console.warn('[AutoUpdate] Failed to download ' + f.path + ': ' + e);
        }

        completed++;
        const pctVal = Math.round((completed / total) * 100);
        if (fill) fill.style.width = pctVal + '%';
        if (pct) pct.textContent = pctVal + '%';
      }

      if (completed > 0) {
        if (label) label.textContent = '鉁?鏇存柊瀹屾垚锛?;
        if (fill) fill.style.background = 'linear-gradient(90deg,#4ade80,#22c55e)';

        await invoke('save_update_manifest').catch(() => {});

        const actions = document.createElement('div');
        actions.style.cssText = 'display:flex;gap:8px;align-items:center;';
        actions.innerHTML = '<button onclick="invoke(\'restart_app\')" style="padding:6px 16px;background:rgba(74,222,128,.2);border:1px solid rgba(74,222,128,.4);color:#4ade80;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;">閲嶅惎绋嬪簭</button>' +
          '<button onclick="this.parentElement.parentElement.remove()" style="padding:6px 12px;background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--text3);border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;">绋嶅悗</button>';
        bar.appendChild(actions);
      } else {
        bar.remove();
      }
    } catch (e) {
      console.log('[AutoUpdate] Non-critical: ' + e);
      const bar = document.getElementById('auto-update-bar');
      if (bar) bar.remove();
    }
  }, 2000);
}

function observeVisibleCards() {
  // 娓呯悊鏃х殑 observer
  if (gridObserver) { gridObserver.disconnect(); gridObserver = null; }
  imageLoadQueue = [];
  activeImageLoads = 0;

  const grid = document.getElementById('grid');
  if (!grid) return;
  const cards = grid.querySelectorAll('.card[data-needs-load="true"]');
  if (cards.length === 0) return;

  gridObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const card = entry.target;
        gridObserver.unobserve(card); // 鍙Е鍙戜竴娆?
        queueImageLoad(card);
      }
    });
  }, {
    root: grid.parentElement, // 浠?main 瀹瑰櫒涓鸿鍙?
    rootMargin: '200px 0px',  // 鎻愬墠200px寮€濮嬪姞杞?
    threshold: 0
  });

  cards.forEach(card => gridObserver.observe(card));
}

function queueImageLoad(card) {
  imageLoadQueue.push(card);
  processImageQueue();
}

function processImageQueue() {
  while (activeImageLoads < MAX_CONCURRENT_LOADS && imageLoadQueue.length > 0) {
    const card = imageLoadQueue.shift();
    // 妫€鏌ュ崱鐗囨槸鍚﹁繕鍦?DOM 涓紙鍙兘宸茶娓呴櫎锛?
    if (!card.isConnected || card.dataset.needsLoad !== 'true') continue;
    card.dataset.needsLoad = 'false';
    activeImageLoads++;

    const brand = card.dataset.brand;
    const model = card.dataset.model;
    const file = card.dataset.file;

    getImageUrl(brand, model, file).then(url => {
      const img = card.querySelector('.thumb');
      if (img) img.src = url;
    }).catch(err => {
      console.warn('鍥剧墖鍔犺浇澶辫触:', file, err);
    }).finally(() => {
      activeImageLoads--;
      processImageQueue(); // 鍔犺浇涓嬩竴寮?
    });
  }
}

    brands[item.brand].total += item.fileCount;
  });

  if (searchOnly && searchTerm) {

    await prefetchCloudModelFiles(brand, model);
  }

  let items = [];
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    const seen = new Set();
    data.forEach(entry => {
      const b = entry.brand.toLowerCase();
      const m = entry.model.toLowerCase();
      const brandMatch = b.includes(term);
      const modelMatch = m.includes(term);
      entry.files.forEach(f => {
        const fm = f.toLowerCase();
        if (brandMatch || modelMatch || fm.includes(term)) {
          const k = `${entry.brand}|${entry.model}|${f}`;
          if (!seen.has(k)) { seen.add(k); items.push({ brand: entry.brand, model: entry.model, file: f }); }
        }
      });
    });

    const entry = data.find(d => d.brand === brand && d.model === model);

  empty.style.display = 'none';

  // 娓呯悊鏃х殑 observer锛岄槻姝㈠宸插垹闄ょ殑 DOM 鍏冪礌鎿嶄綔

  const maxAnimDelay = 0.6; // 鏈€澶?.6绉掑唴鎵€鏈夊崱鐗囧嚭鐜?

    card.dataset.brand = item.brand;

    card.dataset.file = item.file;

      '<div class="info"><div class="model-name">'+item.model+'</div><div class="file-name">'+item.file+'</div></div>';
    card.onclick = () => openViewer(idx);
    frag.appendChild(card);

  // 浣跨敤 IntersectionObserver 寤惰繜鍔犺浇鍙鍖哄煙鐨勫浘鐗?

function prevImage() {

  const sorted = models.slice().sort();

  if (idx > 0) {
    const prevModel = sorted[idx - 1];
    currentModel = prevModel;
    const entry = data.find(d => d.brand === currentBrand && d.model === prevModel);
    if (entry && entry.files.length > 0) {
      lbItems = entry.files.map(f => ({ brand: currentBrand, model: prevModel, file: f }));
      openViewer(0);
      updateNavOverlay();
      buildBrandSidebar(!!searchTerm);
      scrollSidebarToModel(prevModel);
    }
  }
}
function nextImage() {
  if (!currentBrand || !currentModel) return;
  const models = (brandCache[currentBrand] && brandCache[currentBrand].models) || [];
  const sorted = models.slice().sort();
  const idx = sorted.indexOf(currentModel);
  if (idx < sorted.length - 1) {
    const nextModel = sorted[idx + 1];
    currentModel = nextModel;
    const entry = data.find(d => d.brand === currentBrand && d.model === nextModel);
    if (entry && entry.files.length > 0) {
      lbItems = entry.files.map(f => ({ brand: currentBrand, model: nextModel, file: f }));
      openViewer(0);
      updateNavOverlay();
      buildBrandSidebar(!!searchTerm);
      scrollSidebarToModel(nextModel);
    }
  }
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}

function startDraw(e) {
  if (!lbAnnotMode) return;
  isDrawing = true;
  const pos = e.offsetX !== undefined ? { x: e.offsetX * (canvas.width / canvas.getBoundingClientRect().width), y: e.offsetY * (canvas.height / canvas.getBoundingClientRect().height) } : getCanvasPos(e);
  startX = pos.x; startY = pos.y;
  if (annotTool === 'free') { freePoints = [{ x: pos.x, y: pos.y }] }
  else if (annotTool === 'text') {
    const text = prompt('杈撳叆鏍囨敞鏂囧瓧:');
    if (text) {
      annotHistory.push({ type: 'text', x: startX, y: startY, text, color: annotColor, size: annotSize });
      redrawCanvas(); saveAnnotations();
    }
    isDrawing = false;
  }
}

function draw(e) {
  if (!isDrawing || !lbAnnotMode || annotTool === 'text') return;
  const pos = e.offsetX !== undefined ? { x: e.offsetX * (canvas.width / canvas.getBoundingClientRect().width), y: e.offsetY * (canvas.height / canvas.getBoundingClientRect().height) } : getCanvasPos(e);
  redrawCanvas();
  ctx.beginPath();
  ctx.strokeStyle = annotColor;
  ctx.lineWidth = annotSize;
  ctx.fillStyle = annotColor;
  if (annotTool === 'free') {
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    freePoints.push({ x: pos.x, y: pos.y });
    if (freePoints.length > 1) {
      ctx.moveTo(freePoints[freePoints.length - 2].x, freePoints[freePoints.length - 2].y);
      ctx.lineTo(pos.x, pos.y);
    }
    ctx.stroke();
  } else if (annotTool === 'arrow') {
    const angle = Math.atan2(pos.y - startY, pos.x - startX);
    const len = Math.sqrt((pos.x - startX) ** 2 + (pos.y - startY) ** 2);
    if (len < 5) return;
    ctx.moveTo(startX, startY); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    const hl = Math.min(15, len * 0.3);
    ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
    ctx.lineTo(pos.x - hl * Math.cos(angle - 0.4), pos.y - hl * Math.sin(angle - 0.4));
    ctx.lineTo(pos.x - hl * Math.cos(angle + 0.4), pos.y - hl * Math.sin(angle + 0.4));
    ctx.closePath(); ctx.fill();
  } else if (annotTool === 'line') {
    ctx.moveTo(startX, startY); ctx.lineTo(pos.x, pos.y); ctx.stroke();
  } else if (annotTool === 'circle') {
    const cx = (startX + pos.x) / 2, cy = (startY + pos.y) / 2;
    const rx = Math.abs(pos.x - startX) / 2, ry = Math.abs(pos.y - startY) / 2;
    ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
  } else if (annotTool === 'rect') {
    ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
  }
}

function endDraw(e) {
  if (!isDrawing || !lbAnnotMode) return;
  isDrawing = false;
  if (annotTool === 'free' && freePoints && freePoints.length > 1) {
    annotHistory.push({ type: 'free', points: freePoints.slice(), color: annotColor, size: annotSize });
    freePoints = null;
    redrawCanvas(); saveAnnotations();
  } else if (annotTool !== 'text') {
    const pos = e && e.offsetX !== undefined ? { x: e.offsetX * (canvas.width / canvas.getBoundingClientRect().width), y: e.offsetY * (canvas.height / canvas.getBoundingClientRect().height) } : { x: startX, y: startY };
    annotHistory.push({ type: annotTool, x1: startX, y1: startY, x2: pos.x, y2: pos.y, color: annotColor, size: annotSize });
    redrawCanvas(); saveAnnotations();
  }
  freePoints = null;
}

async function saveAnnotations() {
  if (!lbItems[lbIdx]) return;
  const item = lbItems[lbIdx];
  const key = `${item.brand}|${item.model}|${item.file}`;
  const content = JSON.stringify(annotHistory);
  localStorage.setItem('annot_' + key, content);
  try {
    await invoke('save_annotation', { brand: item.brand, model: item.model, file: item.file, content });
  } catch (e) {
    console.error('淇濆瓨鏍囨敞鏂囦欢澶辫触:', e);
  }
}

async function loadAnnotations() {
  if (!lbItems[lbIdx]) return;
  const item = lbItems[lbIdx];
  const key = `${item.brand}|${item.model}|${item.file}`;
  try {
    const content = await invoke('load_annotation', { brand: item.brand, model: item.model, file: item.file });
    if (content && content !== '[]') {
      annotHistory = JSON.parse(content);
    } else {
      const saved = localStorage.getItem('annot_' + key);
      if (saved) {
        annotHistory = JSON.parse(saved);
      } else {
        annotHistory = [];
      }
    }
  } catch (e) {
    console.error('鍔犺浇鏍囨敞鏂囦欢澶辫触:', e);
    const saved = localStorage.getItem('annot_' + key);
    if (saved) {
      try { annotHistory = JSON.parse(saved) } catch(err) { annotHistory = [] }
    } else {
      annotHistory = [];
    }
  }
  redrawCanvas();
}

function undoAnnot() {
  if (annotHistory.length > 0) annotHistory.pop();
  redrawCanvas();
  saveAnnotations();
}

function clearAnnot() {
  if (confirm('娓呴櫎鎵€鏈夋爣娉?')) {
    annotHistory = [];
    redrawCanvas();
    saveAnnotations();
  }
}

function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('v-edit-btn');
  
  const canvas = document.getElementById('v-canvas');
  btn.classList.toggle('edit-active');
  canvas.classList.toggle('edit-mode');

  selectedAnnot = -1;
  redrawCanvas();
}

function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function findAnnotation(x, y) {
  const threshold = 15;
  for (let i = annotHistory.length - 1; i >= 0; i--) {
    const a = annotHistory[i];
    if (a.type === 'free' && a.points) {
      for (let j = 1; j < a.points.length; j++) {
        if (distToSegment(x, y, a.points[j-1].x, a.points[j-1].y, a.points[j].x, a.points[j].y) < threshold) return i;
      }
    } else if (a.type === 'text') {
      if (Math.hypot(x - a.x, y - a.y) < threshold) return i;
    } else if (a.x1 !== undefined && a.x2 !== undefined) {
      const cx = (a.x1 + a.x2) / 2, cy = (a.y1 + a.y2) / 2;
      if (Math.hypot(x - cx, y - cy) < threshold || distToSegment(x, y, a.x1, a.y1, a.x2, a.y2) < threshold) return i;
    }
  }
  return -1;
}

function deleteSelected() {
  if (selectedAnnot < 0 || selectedAnnot >= annotHistory.length) return;
  annotHistory.splice(selectedAnnot, 1);
  selectedAnnot = -1;
  redrawCanvas();
  saveAnnotations();
}

function redrawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  annotHistory.forEach((a, i) => {
    const isSel = i === selectedAnnot;
    ctx.strokeStyle = a.color || '#ff4444';
    ctx.lineWidth = (a.size || 3) + (isSel ? 3 : 0);
    ctx.fillStyle = a.color || '#ff4444';
    if (a.type === 'free' && a.points && a.points.length > 1) {
      ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.beginPath();
      ctx.moveTo(a.points[0].x, a.points[0].y);
      for (let i = 1; i < a.points.length; i++) ctx.lineTo(a.points[i].x, a.points[i].y);
      ctx.stroke();
    } else if (a.type === 'line') {
      ctx.beginPath(); ctx.moveTo(a.x1, a.y1); ctx.lineTo(a.x2, a.y2); ctx.stroke();
    } else if (a.type === 'circle') {
      const cx = (a.x1 + a.x2) / 2, cy = (a.y1 + a.y2) / 2;
      const rx = Math.abs(a.x2 - a.x1) / 2, ry = Math.abs(a.y2 - a.y1) / 2;
      ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
    } else if (a.type === 'arrow') {
      const ax1 = a.x1, ay1 = a.y1, ax2 = a.x2, ay2 = a.y2;
      const angle = Math.atan2(ay2 - ay1, ax2 - ax1);
      const len = Math.sqrt((ax2 - ax1) ** 2 + (ay2 - ay1) ** 2);
      ctx.beginPath(); ctx.moveTo(ax1, ay1); ctx.lineTo(ax2, ay2); ctx.stroke();
      const hl = Math.min(15, len * 0.3);
      ctx.beginPath(); ctx.moveTo(ax2, ay2);
      ctx.lineTo(ax2 - hl * Math.cos(angle - 0.4), ay2 - hl * Math.sin(angle - 0.4));
      ctx.lineTo(ax2 - hl * Math.cos(angle + 0.4), ay2 - hl * Math.sin(angle + 0.4));
      ctx.closePath(); ctx.fill();
    } else if (a.type === 'rect') {
      ctx.strokeRect(a.x1, a.y1, a.x2 - a.x1, a.y2 - a.y1);
    } else if (a.type === 'text') {
      ctx.font = `${(a.size || 3) * 5}px sans-serif`;
      ctx.fillText(a.text, a.x, a.y);
    }
    if (isSel) {
      ctx.strokeStyle = '#4fc3f7';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      if (a.type === 'text') {
        ctx.strokeRect(a.x - 20, a.y - 20, 40, 40);
      } else if (a.x1 !== undefined && a.x2 !== undefined) {
        const x = Math.min(a.x1, a.x2), y = Math.min(a.y1, a.y2);
        const w = Math.abs(a.x2 - a.x1), h = Math.abs(a.y2 - a.y1);
        ctx.strokeRect(x - 3, y - 3, w + 6, h + 6);
      }
      ctx.setLineDash([]);
    }
  });
}

canvas.addEventListener('click', function(e) {
  if (!lbAnnotMode || !editMode) return;
  const pos = e.offsetX !== undefined ? { x: e.offsetX * (canvas.width / canvas.getBoundingClientRect().width), y: e.offsetY * (canvas.height / canvas.getBoundingClientRect().height) } : { x: 0, y: 0 };
  const idx = findAnnotation(pos.x, pos.y);
  selectedAnnot = idx;
  redrawCanvas();
});

document.addEventListener('keydown', e => {
  if (document.getElementById('viewer').style.display !== 'flex') return;
  if (e.key === 'ArrowLeft') { if (editMode && selectedAnnot >= 0) { e.preventDefault(); nudgeAnnot(-2, 0) } else prevImage() }
  else if (e.key === 'ArrowRight') { if (editMode && selectedAnnot >= 0) { e.preventDefault(); nudgeAnnot(2, 0) } else nextImage() }
  else if (e.key === 'ArrowUp') { if (editMode && selectedAnnot >= 0) { e.preventDefault(); nudgeAnnot(0, -2) } }
  else if (e.key === 'ArrowDown') { if (editMode && selectedAnnot >= 0) { e.preventDefault(); nudgeAnnot(0, 2) } }
  else if (e.key === 'Delete' || e.key === 'Backspace') { if (editMode && selectedAnnot >= 0) { e.preventDefault(); deleteSelected() } }
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === 'r') rotateImg(90);
  if (e.key === 'a' && e.ctrlKey) { e.preventDefault(); toggleAnnot() }
});

function nudgeAnnot(dx, dy) {
  const a = annotHistory[selectedAnnot];
  if (!a) return;
  const scale = canvas.width / canvas.getBoundingClientRect().width;
  const sdx = dx * scale, sdy = dy * scale;
  if (a.type === 'free' && a.points) { a.points.forEach(p => { p.x += sdx; p.y += sdy }) }
  else if (a.type === 'text') { a.x += sdx; a.y += sdy }
  else { a.x1 += sdx; a.y1 += sdy; a.x2 += sdx; a.y2 += sdy }
  redrawCanvas();
  saveAnnotations();
}

window.addEventListener('resize', () => {
  if (lbAnnotMode) fitCanvasToScreen();
});

  document.getElementById('settings-modal').classList.add('show');

}

function closeSettingsModal() {

}

  document.getElementById('github-fields').style.display = mode === 'github' ? 'block' : 'none';

}
function _updateModeRadioStyle() {
  const checked = document.querySelector('input[name="work-mode"]:checked');
  const val = checked ? checked.value : 'github';
  document.querySelectorAll('input[name="work-mode"]').forEach(function(r) {
    var lbl = r.closest('label');
    if (lbl) {
      if (r.value === val) {
        lbl.style.borderColor = 'var(--accent)';
        lbl.style.background = 'rgba(94,175,255,.12)';
      } else {
        lbl.style.borderColor = 'var(--border)';
        lbl.style.background = 'rgba(255,255,255,.03)';
      }
    }
  });
}

function saveSettings() {
  const checked = document.querySelector('input[name="work-mode"]:checked');
  const mode = checked ? checked.value : 'github';
  const newLocalPath = document.getElementById('setting-local-path').value.trim();
  const cdnNode = document.getElementById('setting-cdn').value;

  localStorage.setItem('app_mode', mode);
  localStorage.setItem('local_custom_path', newLocalPath);
  localStorage.setItem('cdn_node', cdnNode);
  
  appMode = mode;
  MAX_CONCURRENT_LOADS = (mode === 'local') ? 12 : 3;
  localCustomPath = newLocalPath;
  ghBlobCache = {};
  
  closeSettingsModal();
  init();
}

async function uploadImages() {
  if (!currentBrand || !currentModel) {
    alert("璇峰厛鍦ㄥ乏渚ч€夋嫨鍝佺墝鍜屽瀷鍙?);
    return;
  }
  
  try {
    const overlay = document.getElementById('upload-progress-overlay');
    const bar = document.getElementById('upload-progress-bar');
    const text = document.getElementById('upload-progress-text');
    const filename = document.getElementById('upload-progress-filename');
    
    // Determine the listen function (Tauri v2)
    const listenFn = (window.__TAURI__ && window.__TAURI__.event && window.__TAURI__.event.listen) || 
                     (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.listen);
                     
    let unlisten = null;
    if (listenFn) {
      unlisten = await listenFn('upload_progress', (event) => {
        const { current, total, current_file } = event.payload;
        const percent = (current / total) * 100;
        bar.style.width = `${percent}%`;
        text.textContent = `${current} / ${total}`;
        filename.textContent = current_file;
      });
    }

    overlay.style.display = 'flex';
    bar.style.width = '0%';
    text.textContent = '璇峰湪寮瑰嚭鐨勫璇濇涓€夋嫨鍥剧墖...';
    filename.textContent = '';
    
    await invoke('upload_local_images', { basePath: localBaseDir, brand: currentBrand, model: currentModel });
    
    if (unlisten) unlisten();
    overlay.style.display = 'none';
    
    // Refresh library automatically
    syncLibrary();
  } catch (e) {
    console.error(e);
    alert("涓婁紶澶辫触: " + e);
    document.getElementById('upload-progress-overlay').style.display = 'none';
  }
}

// Add a generic refresh-data listener in case Rust triggers it
if (window.__TAURI__ && window.__TAURI__.event && window.__TAURI__.event.listen) {
    window.__TAURI__.event.listen('refresh-data', () => {
        syncLibrary();
    });
} else if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.listen) {
    window.__TAURI__.core.listen('refresh-data', () => {
        syncLibrary();
    });
}
